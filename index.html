<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Recherche stock GiFi</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <h1>Recherche stock GiFi</h1>

    <section class="card">
      <div class="form-grid">
        <div>
          <label for="productCode">Code article</label>
          <input
            id="productCode"
            type="text"
            inputmode="numeric"
            placeholder="Ex: 643200"
            autocomplete="off"
          />
        </div>

        <div class="inline-grid">
          <div>
            <label for="quantity">Quantité</label>
            <input id="quantity" type="number" min="1" step="1" value="1" />
          </div>

          <div>
            <label for="safetyStock">Seuil stock</label>
            <input id="safetyStock" type="number" min="0" step="1" value="5" />
          </div>
        </div>
      </div>

      <div class="actions">
        <button id="searchBtn" type="button">Rechercher</button>
      </div>

      <p id="statusText" class="status-text">Prêt.</p>
    </section>

    <section id="productCard" class="card product-card hidden">
      <div class="product-layout">
        <div class="product-left">
          <div class="gallery-shell">
            <div class="gallery-thumbs" id="galleryThumbs"></div>

            <div class="gallery-stage">
              <button
                type="button"
                id="galleryPrev"
                class="gallery-nav gallery-nav--prev hidden"
                aria-label="Image précédente"
              >
                ‹
              </button>

              <div id="productGallery" class="product-gallery"></div>

              <button
                type="button"
                id="galleryNext"
                class="gallery-nav gallery-nav--next hidden"
                aria-label="Image suivante"
              >
                ›
              </button>

              <div id="productGalleryCounter" class="gallery-counter hidden"></div>
            </div>
          </div>

          <div id="productGalleryDots" class="product-gallery-dots"></div>
        </div>

        <div class="product-right">
          <div id="productTitle" class="product-title"></div>
          <div id="productRef" class="product-ref"></div>

          <div class="price-hero">
            <div class="current-price-block">
              <div class="current-price">
                <span id="productCurrentInteger" class="price-integer"></span>
                <span class="price-right">
                  <span id="productCurrentCurrency" class="price-currency">€</span>
                  <span id="productCurrentDecimal" class="price-decimal"></span>
                </span>
              </div>

              <div id="productEcoTax" class="eco-tax hidden"></div>
            </div>

            <div id="productPromoRow" class="promo-block hidden">
              <div class="promo-badges">
                <div id="productPromoBadge" class="promo-badge"></div>
                <div id="productDiscount" class="promo-discount"></div>
              </div>

              <div class="old-price-wrap">
                <div class="old-price-diagonal">
                  <span id="productOldPriceInteger" class="old-price-integer"></span>
                  <span class="old-price-right">
                    <span id="productOldPriceCurrency" class="old-price-currency">€</span>
                    <span id="productOldPriceDecimal" class="old-price-decimal"></span>
                  </span>
                </div>
              </div>
            </div>
          </div>

          <div id="productDescription" class="product-description hidden"></div>

          <div id="productMeta" class="product-meta hidden"></div>

          <div id="limonestCard" class="limonest-card hidden">
            <div class="limonest-card__title">Stock Limonest</div>

            <div class="limonest-card__content">
              <div class="limonest-metric">
                <span class="limonest-metric__label">Stock</span>
                <span id="limonestStock" class="limonest-metric__value"></span>
              </div>

              <div class="limonest-metric">
                <span class="limonest-metric__label">Statut</span>
                <span id="limonestStatus" class="mini-status"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Magasin</th>
              <th>Stocks</th>
              <th>Statut</th>
            </tr>
          </thead>
          <tbody id="resultsBody">
            <tr>
              <td colspan="3" class="empty">Aucun résultat.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
