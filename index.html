<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock GiFi</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <h1>Recherche stock GiFi</h1>

    <div class="card">
      <div class="form-grid">
        <div>
          <label for="productCode">Code article</label>
          <input
            id="productCode"
            type="text"
            placeholder="Ex: 643421"
            inputmode="numeric"
          />
        </div>

        <div>
          <label for="quantity">Quantité</label>
          <input id="quantity" type="number" min="1" value="1" />
        </div>
      </div>

      <div class="form-grid mt">
        <div>
          <label for="safetyStock">Safety stock</label>
          <input id="safetyStock" type="number" min="0" value="5" />
        </div>

        <div class="align-end">
          <button id="searchBtn">Rechercher</button>
        </div>
      </div>
    </div>

    <div id="productCard" class="card product-card hidden">
      <div class="product-layout">
        <div class="product-visual">
          <img id="productImage" src="" alt="" />
        </div>

        <div class="product-meta">
          <div id="productTitle" class="product-title"></div>
          <div id="productRef" class="product-ref"></div>
          <div id="productPrice" class="product-price"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div id="statusText">Prêt.</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>CP</th>
              <th>Magasin</th>
              <th>Code Article</th>
              <th>Stocks</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="resultsBody">
            <tr>
              <td colspan="5" class="empty">Aucun résultat.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
