<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock GiFi</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <h1>Recherche stock GiFi</h1>

    <div class="card">
      <div class="form-grid single-field-grid">
        <div>
          <label for="productCode">Code article</label>
          <input
            id="productCode"
            type="text"
            placeholder="Ex: 643421"
            inputmode="numeric"
            enterkeyhint="search"
          />
        </div>
      </div>

      <div class="hidden-fields" aria-hidden="true">
        <input id="quantity" type="hidden" value="1" />
        <input id="safetyStock" type="hidden" value="5" />
      </div>

      <div class="mt">
        <button id="searchBtn">Rechercher</button>
      </div>
    </div>

    <div id="productCard" class="card product-card hidden">
      <div class="product-layout">
        <div class="product-visual">
          <div class="product-gallery-shell">
            <button id="galleryPrev" class="gallery-nav gallery-nav--prev hidden" type="button" aria-label="Image précédente">‹</button>

            <div id="productGallery" class="product-gallery"></div>

            <button id="galleryNext" class="gallery-nav gallery-nav--next hidden" type="button" aria-label="Image suivante">›</button>
          </div>
          
          <div id="productGalleryDots" class="product-gallery-dots"></div>
      </div>

        <div class="product-meta">
          <div id="productTitle" class="product-title"></div>
          <div id="productRef" class="product-ref"></div>

          <div class="price-hero">
            <div class="current-price-block">
              <div class="current-price">
                <span id="productCurrentInteger" class="price-integer"></span>
                <span class="price-right">
                  <span id="productCurrentCurrency" class="price-currency">€</span>
                  <span id="productCurrentDecimal" class="price-decimal"></span>
                </span>
              </div>

              <div id="productEcoTax" class="eco-tax hidden"></div>
            </div>

            <div id="productPromoRow" class="promo-block hidden">
              <div class="old-price-wrap">
                <div class="old-price-diagonal">
                  <span id="productOldPriceInteger" class="old-price-integer"></span>
                  <span class="old-price-right">
                    <span id="productOldPriceCurrency" class="old-price-currency">€</span>
                    <span id="productOldPriceDecimal" class="old-price-decimal"></span>
                  </span>
                </div>
              </div>

              <div class="promo-badges">
                <span id="productPromoBadge" class="promo-badge"></span>
                <span id="productDiscount" class="promo-discount"></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="limonestCard" class="limonest-card hidden">
        <div class="limonest-card__title">Stock Limonest</div>
        <div class="limonest-card__content">
          <div class="limonest-metric">
            <span class="limonest-metric__label">Stock</span>
            <span id="limonestStock" class="limonest-metric__value"></span>
          </div>
          <div class="limonest-metric">
            <span class="limonest-metric__label">Statut</span>
            <span id="limonestStatus" class="mini-status"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div id="statusText">Prêt.</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Magasin</th>
              <th>Stocks</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="resultsBody">
            <tr>
              <td colspan="3" class="empty">Aucun résultat.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
